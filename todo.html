<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <!-- 登录模态框 -->
    <div id="login-modal" class="modal show">
        <div class="modal-content login-modal-content">
            <h2>欢迎使用待办事项</h2>
            <p class="login-hint">请输入您的用户名开始使用</p>
            <div class="login-form">
                <input type="text" id="username-input" class="task-input" placeholder="输入用户名..." maxlength="20">
                <button id="login-btn" class="btn btn-primary">进入</button>
            </div>
            <div id="user-list-section">
                <p class="login-hint">或选择已有用户：</p>
                <div id="user-list" class="user-list"></div>
            </div>
        </div>
    </div>

    <div class="app-container" id="app-container" style="display: none;">
        <!-- 头部 -->
        <header class="header">
            <div class="header-left">
                <h1>📋 我的待办</h1>
                <span id="welcome-user" class="welcome-user"></span>
            </div>
            <div class="header-right">
                <span id="task-count">0 项任务</span>
                <button id="switch-user" class="btn btn-text">切换用户</button>
            </div>
        </header>

        <!-- 输入区域 -->
        <div class="input-section">
            <input type="text" id="task-input" class="task-input" placeholder="添加新任务...">
            <button id="add-btn" class="btn btn-primary">添加</button>
        </div>

        <!-- 筛选选项 -->
        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="pending">待完成</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
        </div>

        <!-- 任务列表 -->
        <div class="task-list" id="task-list">
            <div class="empty-state">
                <p>暂无待办任务</p>
                <p class="empty-hint">添加新任务开始吧！</p>
            </div>
        </div>

        <!-- 底部操作栏 -->
        <div class="footer-actions" id="footer-actions" style="display: none;">
            <span id="remaining-count">0 项待完成</span>
            <button id="clear-completed" class="btn btn-text">清除已完成</button>
        </div>
    </div>

    <script src="todo.js"></script>
</body>
</html>
